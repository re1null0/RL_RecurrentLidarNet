experiment_name: "tdmpc_experiment"

# Environment settings
env_id: "f110_gym:f110-v0"
map_path: "maps/levine.yaml"
n_envs: 1
max_episode_steps: 1000
domain_randomization: true
sensor_noise:
  lidar: 0.01
  speed: 0.05

lidar:
  enabled: true
  downsample: false
include_velocity_in_obs: true

# Algorithm
algorithm: "tdmpc"
latent_dim: 64
learning_rate: 0.0003
gamma: 0.99
batch_size: 64
total_timesteps: 100000
replay_buffer_size: 50000

# Planning
planning_horizon: 5
planning_iterations: 5
planning_samples: 512
planning_elites: 64

wandb:
  enabled: false
save_interval: 10000
seed: 42
